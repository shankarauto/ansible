- name: variable preference
  hosts: local
  connection: local
  vars:
    NAME: "Ansible from play"
  var-files: 
  - course.yaml
  vars_prompt:
  - name: NAME
    prompt: please enter name
    private: false

  tasks:
  - name: print name
    vars:
      NAME: "Ansible from Task"
      ansible.builtin.debug:
        msg " Hi {{ NAME}}"
